# Beads for FEAT-004: Self-Update and Installer

beads:
  - id: BEAD-FEAT-004-01
    title: "Add version command with update availability check"
    spec_ref: docs/helix/01-frame/features/FEAT-004-self-update.md
    acceptance_criteria:
      - "ddx-agent version shows current version (e.g., v0.0.8)"
      - "If outdated, shows 'update available: vX.Y.Z'"
      - "If up-to-date, shows '(latest)'"
      - "Version check completes in < 3 seconds"
    depends_on: []

  - id: BEAD-FEAT-004-02
    title: "Implement ddx-agent update command with safe binary replacement"
    spec_ref: docs/helix/01-frame/features/FEAT-004-self-update.md
    acceptance_criteria:
      - "ddx-agent update checks for latest release via GitHub API"
      - "Shows version comparison and changelog summary"
      - "Prompts user before downloading (y/N)"
      - "Downloads to temp location, verifies, then atomically replaces"
      - "Preserves permissions and ownership"
      - "Handles network errors gracefully without corrupting binary"
    depends_on:
      - BEAD-FEAT-004-01

  - id: BEAD-FEAT-004-03
    title: "Add --check-only flag for scripting support"
    spec_ref: docs/helix/01-frame/features/FEAT-004-self-update.md
    acceptance_criteria:
      - "ddx-agent update --check-only compares versions without downloading"
      - "Exit code 0 if up-to-date, exit code 1 if outdated"
      - "Prints version comparison to stdout for scripting"
    depends_on:
      - BEAD-FEAT-004-02

  - id: BEAD-FEAT-004-04
    title: "Enhance install.sh with colored output and PATH configuration"
    spec_ref: docs/helix/01-frame/features/FEAT-004-self-update.md
    acceptance_criteria:
      - "Colored output (blue info, green success, yellow warning, red error)"
      - "Prerequisites checking (curl/wget availability)"
      - "PATH configuration in .bashrc, .zshrc, or config.fish"
      - "Installation verification with agent --version test"
      - "Getting started guide with quick commands"
    depends_on: []

  - id: BEAD-FEAT-004-05
    title: "Add unit tests for version comparison and update logic"
    spec_ref: docs/helix/01-frame/features/FEAT-004-self-update.md
    acceptance_criteria:
      - "Semantic version parsing tests (v0.0.8, v1.2.3, v0.1.0-beta)"
      - "Version comparison tests (Less function)"
      - "GitHub API integration tests with mock server"
      - "Binary path detection tests"
    depends_on:
      - BEAD-FEAT-004-02

