name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags "-X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -X main.GitCommit=${GIT_COMMIT}" \
            -o ddx-agent-${GOOS}-${GOARCH} ./cmd/ddx-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddx-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ddx-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Flatten artifacts — each is in a subdirectory
          mkdir -p release/
          for dir in dist/ddx-agent-*/; do
            cp "$dir"ddx-agent-* release/ 2>/dev/null || true
          done

          # Make binaries executable
          chmod +x release/ddx-agent-*

          ls -la release/

          gh release create ${GITHUB_REF_NAME} release/ddx-agent-* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
