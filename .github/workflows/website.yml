name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'internal/modelcatalog/catalog/models.yaml'
      - 'catalogdist/**'
      - 'cmd/catalogdist/**'
      - 'Makefile'
      - 'website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.160.0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo_extended_${HUGO_VERSION}_linux-amd64.deb

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build catalog distribution
        env:
          MIN_AGENT_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          rm -rf website/static/catalog
          MIN_AGENT_VERSION="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo dev)"
          make catalog-dist

      - name: Build
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
