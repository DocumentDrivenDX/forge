id: reasoning-plus-tools
description: "Reasoning + tools: find the largest Go file in the current directory"
prompt: |
  Find the largest Go source file (*.go) in the current working directory
  (non-recursive). Report its name and size in bytes. Use tools to inspect
  the files — do not guess.
expected_tools:
  - find
  - read
permissions: safe
reasoning: low
tags:
  - tool-use
  - reasoning
