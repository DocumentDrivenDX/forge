name: docker-vim
replay_mode: collapsed
terminal_size:
  rows: 22
  cols: 76
expected_artifacts:
  - manifest.json
  - input.jsonl
  - output.raw
  - output.jsonl
  - frames.jsonl
  - service-events.jsonl
  - final.json
  - scrub-report.json
resolution_ms: 50
groups:
  screen:
    - {name: initial-buffer, type: frame_eventually_contains, text: "alpha vim conformance", within_ms: 5000}
    - {name: inserted-line, type: frame_eventually_contains, text: "DDX-typed-line", within_ms: 5000}
  streams:
    - {type: raw_output_order}
    - {name: insert-text, type: input_bytes, bytes_hex: "474f4444582d74797065642d6c696e65"}
    - {name: escape-key, type: input_bytes, key: "escape"}
    - {type: timing_gap, kind: frame, min_ms: 0, max_ms: 2500}
  service:
    - {type: service_json, json_path: "$.type", equals: "tui-conformance"}
    - {type: service_json, json_path: "$.case", equals: "vim"}
    - {type: final_metadata, metadata_key: "case", equals: "vim"}
    - {type: exit_status, exit_code: 0, signaled: false}
