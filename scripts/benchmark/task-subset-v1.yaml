# Fixed benchmark subset for ddx-agent — v1 (2026-04-08)
# See docs/helix/02-design/solution-designs/SD-009-benchmark-mode.md for rationale.
#
# IMPORTANT: Do not modify task IDs without updating the version field and filing a bead.
# Task IDs are placeholders pending adapter validation (agent-a3ce467a).
