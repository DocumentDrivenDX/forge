baseURL: https://documentdrivendx.github.io/agent/
title: DDX Agent
locale: en-us

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableRobotsTXT: true
enableGitInfo: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Demos
      pageRef: /demos
      weight: 2
    - name: GitHub
      url: https://github.com/DocumentDrivenDX/agent
      weight: 3
      params:
        icon: github

params:
  description: Embeddable Go agent runtime — local-model-first via LM Studio
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  editURL:
    enable: true
    base: https://github.com/DocumentDrivenDX/agent/edit/main/website/content
